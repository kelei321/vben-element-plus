name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate root Element Plus app
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare validation logs
        run: mkdir -p .ci-logs

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee .ci-logs/lint.log

      - name: Report lint failure
        if: github.event_name == 'pull_request' && steps.lint.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '<!-- vben-element-plus-ci-failure -->'
            echo '### CI validation failure'
            echo
            echo '**Failed step:** `pnpm lint`'
            echo
            echo '<details><summary>Last 120 log lines</summary>'
            echo
            echo '```text'
            tail -n 120 .ci-logs/lint.log
            echo '```'
            echo '</details>'
          } > .ci-logs/pr-comment.md

          gh pr comment "$PR_NUMBER" \
            --edit-last \
            --create-if-none \
            --body-file .ci-logs/pr-comment.md

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Typecheck root app
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee .ci-logs/typecheck.log

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee .ci-logs/unit-tests.log

      - name: Build root app
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee .ci-logs/build.log

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: .ci-logs
          if-no-files-found: ignore
          retention-days: 7
