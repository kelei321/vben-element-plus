name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Vben 5.5.9 baseline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare validation logs
        run: mkdir -p .ci-logs

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee .ci-logs/lint.log

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm check:type 2>&1 | tee .ci-logs/typecheck.log

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test:unit 2>&1 | tee .ci-logs/unit-tests.log

      - name: Build Element Plus app
        shell: bash
        run: |
          set -o pipefail
          pnpm build:ele 2>&1 | tee .ci-logs/build-ele.log

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: .ci-logs
          if-no-files-found: ignore
          retention-days: 7
