name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate root Element Plus app
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare validation logs
        run: mkdir -p .ci-logs

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee .ci-logs/lint.log

      - name: Typecheck root app
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee .ci-logs/typecheck.log

      - name: Unit tests
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee .ci-logs/unit-tests.log

      - name: Build root app
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee .ci-logs/build.log

      - name: Report validation failures
        if: >-
          github.event_name == 'pull_request' &&
          (steps.lint.outcome == 'failure' ||
          steps.typecheck.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure')
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          GH_TOKEN: ${{ github.token }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
        shell: bash
        run: |
          {
            echo '<!-- vben-element-plus-ci-failure -->'
            echo '### CI validation failure'
            echo

            append_failure() {
              local outcome="$1"
              local command="$2"
              local log_file="$3"

              if [ "$outcome" != 'failure' ]; then
                return
              fi

              echo "**Failed step:** \`$command\`"
              echo
              echo '<details><summary>Last 120 log lines</summary>'
              echo
              echo '```text'
              tail -n 120 "$log_file"
              echo '```'
              echo '</details>'
              echo
            }

            append_failure "$LINT_OUTCOME" 'pnpm lint' '.ci-logs/lint.log'
            append_failure "$TYPECHECK_OUTCOME" 'pnpm typecheck' '.ci-logs/typecheck.log'
            append_failure "$TEST_OUTCOME" 'pnpm test' '.ci-logs/unit-tests.log'
            append_failure "$BUILD_OUTCOME" 'pnpm build' '.ci-logs/build.log'
          } > .ci-logs/pr-comment.md

          gh pr comment "$PR_NUMBER" \
            --edit-last \
            --create-if-none \
            --body-file .ci-logs/pr-comment.md

      - name: Upload failure logs
        if: >-
          steps.lint.outcome == 'failure' ||
          steps.typecheck.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: .ci-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce validation results
        if: >-
          steps.lint.outcome == 'failure' ||
          steps.typecheck.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        run: exit 1
