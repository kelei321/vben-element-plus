name: Update PR16 final plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 16 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第四批）

          - 状态：进行中
          - 实际 PR：#16
          - 当前范围：本地化 `LOGIN_PATH`，统一路由守卫、核心路由和认证 Store 的登录路径来源，不修改认证或重定向逻辑
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第四批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#16
          - 已验证实现提交：`2a35e484bfbb7677c5364f7877849a8dcb541f71`
          - CI：run `29974533077` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：路由守卫、核心路由、认证 Store、`src/router/constants.ts`、对应测试、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 `LOGIN_PATH`；未修改认证流程、路由定义、守卫逻辑、权限、菜单、依赖或锁文件
          '''
          if old_progress not in text:
              raise SystemExit('PR16 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR #16 正在本地化登录路由常量
          - 当前改动：新增 `src/router/constants.ts` 与契约测试；路由守卫、核心路由和认证 Store 统一使用本地 `LOGIN_PATH`
          - 下一步：完成 PR #16 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前阶段：PR #16 已完成第四批实现与 CI，等待最终 review 与合并
          - 当前改动：新增 `src/router/constants.ts` 与契约测试；路由守卫、核心路由和认证 Store 统一使用本地 `LOGIN_PATH`
          - 下一步：合并 PR #16 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr16-final-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr16-final-plan.yml
          git commit -m 'docs: update PR16 validation and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
