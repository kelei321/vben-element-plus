name: Update plan handoff

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_pr3 = '''#### PR3：建立单仓运行入口

          - 状态：已完成
          - 实际 PR：#7
          - 已验证提交：`d26f7d358a75cf4568ffb85236e9b84c31d16d3c`
          - CI：run `29941826836` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - 本地验证：`pnpm dev` 未运行，需要合并后本地启动并检查登录、菜单、标签页和 Element Plus 页面
          - 范围：建立根入口和配置，继续复用 `apps/web-ele` 与 workspace 依赖；未升级依赖、未修改锁文件、未改写业务逻辑
          '''

          new_pr3 = '''#### PR3：建立单仓运行入口

          - 状态：已完成
          - 实际 PR：#7
          - 最终 head：`6c54cf30400f912e6fd03e7229e758d6529f58f7`
          - 合并提交：`96096b2d295acca79f798f4331a419e3e75808af`
          - CI：run `29942239473` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - 本地验证：`pnpm dev` 未运行，需要启动后检查登录、菜单、标签页和 Element Plus 页面
          - 范围：建立根入口和配置，继续复用 `apps/web-ele` 与 workspace 依赖；未升级依赖、未修改锁文件、未改写业务逻辑

          #### PR4：迁入 Vben 必要源码

          - 状态：进行中
          - 实际 PR：#8
          - 当前范围：先梳理并迁移低风险运行时基础能力，保持现有行为，不升级依赖、不重写表单
          '''

          if old_pr3 not in text:
              raise SystemExit('PR3 progress block not found')
          text = text.replace(old_pr3, new_pr3, 1)

          marker = '更新规则：每个 PR 完成目标改动后，必须先更新本节中的状态、实际 PR、最终 head 或合并提交、真实验证结果和范围结论，再进行最终 review 与合并。\n\n'
          handoff = '''更新规则：每个 PR 完成目标改动后，必须先更新本节中的状态、实际 PR、最终 head 或合并提交、真实验证结果和范围结论，并同步更新下方“新会话交接”，再进行最终 review 与合并。

          ### 新会话交接

          - 仓库：`kelei321/vben-element-plus`
          - 源码基线：Vben `v5.5.9`，唯一目标应用为 `apps/web-ele`
          - 当前 main：`96096b2d295acca79f798f4331a419e3e75808af`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口和根 `dev/build/typecheck/test` 命令
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；运行时仍依赖 workspace 包；尚未升级依赖或修改锁文件
          - 当前阶段：PR4 迁入 Vben 必要运行时源码，优先从低风险基础能力开始，按实际依赖拆成小步提交
          - 下一步：读取仓库规则和 `apps/web-ele` 直接依赖图，确定首个本地化单元并完成 CI 验证
          - 未完成验证：需要本地运行 `pnpm dev`，检查登录、菜单、标签页、权限和 Element Plus 页面
          - 硬性约束：不提前升级依赖；不引入 TanStack Form；不重写旧表单；不改变业务行为；不删除尚被引用的 workspace 包；每次 PR 合并前更新执行进度和本交接内容

          '''

          if marker not in text:
              raise SystemExit('handoff insertion marker not found')
          text = text.replace(marker, handoff, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-plan-handoff.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-plan-handoff.yml
          git commit -m 'docs: add migration handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
