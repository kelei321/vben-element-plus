name: Update PR17 final plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 17 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第五批）

          - 状态：进行中
          - 实际 PR：#17
          - 当前范围：本地化路由模块默认导出合并与核心路由名称收集，不迁移通用树过滤、映射或其他工具
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第五批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#17
          - 已验证实现提交：`1ec6cfe5dd4f129d7ed8ef119c04a5763b34aebe`
          - CI：run `29976074463` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/router/routes/index.ts`、`src/router/route-modules.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化路由模块合并与名称收集；未修改路由定义、守卫、权限、菜单、动态导入、依赖或锁文件
          '''
          if old_progress not in text:
              raise SystemExit('PR17 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR #17 正在本地化路由模块聚合工具
          - 当前改动：新增 `src/router/route-modules.ts` 与单测；`apps/web-ele/src/router/routes/index.ts` 移除两项 `@vben/utils` 运行时导入
          - 下一步：完成 PR #17 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前阶段：PR #17 已完成第五批实现与 CI，等待最终 review 与合并
          - 当前改动：新增包无关的 `src/router/route-modules.ts` 与单测；`apps/web-ele/src/router/routes/index.ts` 移除两项 `@vben/utils` 运行时导入
          - 下一步：合并 PR #17 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr17-final-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr17-final-plan.yml
          git commit -m 'docs: update PR17 validation and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
