name: Format PR20 files

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.number == 20 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.1.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format changed files
        run: pnpm exec prettier runtime-localization.md src/access/check-directive-access.ts --write

      - name: Remove temporary workflow
        run: rm .github/workflows/format-pr20.yml

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add runtime-localization.md src/access/check-directive-access.ts .github/workflows/format-pr20.yml
          git commit -m 'style: format PR20 files'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
