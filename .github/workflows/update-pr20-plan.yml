name: Update PR20 plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 20 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress, handoff, and runtime record
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          plan_path = Path('plan.md')
          text = plan_path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第七批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#19
          - 已验证实现提交：`19c5d281947939b34993d5251c332c573f9ff505`
          - CI：run `29981980920` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/locales/index.ts`、`src/locales/load-locales-map-from-dir.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化语言目录聚合 helper；未修改翻译内容、I18n 实例、语言切换、第三方语言包、依赖或锁文件
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第七批）

          - 状态：已完成
          - 实际 PR：#19
          - 最终 head：`8190314a480d8ffd1029f3eab3bfb238857908e7`
          - 合并提交：`9f1316cceefa6fb5998b87f6b356dae5177bbae3`
          - CI：run `29982298242` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/locales/index.ts`、`src/locales/load-locales-map-from-dir.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化语言目录聚合 helper；未修改翻译内容、I18n 实例、语言切换、第三方语言包、依赖或锁文件

          #### PR4：迁入 Vben 必要源码（第八批）

          - 状态：进行中
          - 实际 PR：#20
          - 当前范围：本地化 `v-access` 指令注册与角色/权限码判断，不迁移权限组件、路由权限、动态菜单或访问状态
          '''
          if old_progress not in text:
              raise SystemExit('PR19 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前 main：`56debb9d1409415206b29b41fbe9c95bf944b11d`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口；PR #13 本地化全局 Loading；PR #14 本地化偏好覆盖 helper；PR #15 本地化静态路由重置工具；PR #16 本地化登录路由常量；PR #17 本地化路由模块聚合工具；PR #18 本地化 API 地址解析
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；Loading、偏好覆盖 helper、路由基础工具、登录路径常量和 API 地址解析已本地化；其他运行时仍依赖 workspace 包
          - 当前阶段：PR #19 已完成第七批实现与 CI，等待最终 review 与合并
          - 当前改动：新增包无关的 `src/locales/load-locales-map-from-dir.ts` 与单测；`apps/web-ele/src/locales/index.ts` 移除该 helper 的运行时 workspace 导入
          - 下一步：合并 PR #19 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前 main：`9f1316cceefa6fb5998b87f6b356dae5177bbae3`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口；PR #13 本地化全局 Loading；PR #14 本地化偏好覆盖 helper；PR #15 本地化静态路由重置工具；PR #16 本地化登录路由常量；PR #17 本地化路由模块聚合工具；PR #18 本地化 API 地址解析；PR #19 本地化语言目录聚合 helper
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；Loading、偏好覆盖 helper、路由基础工具、登录路径常量、API 地址解析和语言目录聚合已本地化；其他运行时仍依赖 workspace 包
          - 当前阶段：PR #20 正在本地化 `v-access` 权限指令
          - 当前改动：新增 `src/access/check-directive-access.ts` 与单测、应用侧 `apps/web-ele/src/access/directive.ts`；`bootstrap.ts` 移除权限指令的运行时 workspace 导入
          - 下一步：完成 PR #20 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)
          plan_path.write_text(text, encoding='utf-8')

          runtime_path = Path('runtime-localization.md')
          runtime = runtime_path.read_text(encoding='utf-8')
          section = '''

          ## 第八批：权限指令

          ### 迁移内容

          - 将角色/权限码判断迁入 `src/access/check-directive-access.ts`。
          - 将 `v-access` 注册迁入 `apps/web-ele/src/access/directive.ts`。
          - `apps/web-ele/src/bootstrap.ts` 不再为权限指令运行时导入 `@vben/access`。

          ### 行为约束

          - 前端访问模式且参数为 `role` 时继续使用用户角色判断。
          - 其他模式和参数继续使用权限码判断。
          - 单个字符串和字符串数组继续采用“任一匹配即可访问”的语义。
          - 未提供指令值时继续保留元素；无权限时继续直接移除元素。
          - 权限 Store、偏好、权限组件、路由权限和动态菜单保持不变。
          - `@vben/access` 仍被其他模块使用，本批次不删除该依赖或对应 workspace 源码。

          ### 验证

          - 新增单元测试，覆盖角色模式、权限码模式、拒绝访问和空指令值。
          - 完整 lint、typecheck、unit test 和 root build 结果在本 PR 最终验证时记录。
          '''
          if '## 第八批：权限指令' not in runtime:
              runtime_path.write_text(runtime.rstrip() + section + '\n', encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr20-plan.yml

      - name: Commit documentation update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md runtime-localization.md .github/workflows/update-pr20-plan.yml
          git commit -m 'docs: update PR20 progress and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
