name: Update PR21 final plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 21 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.1.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update validation and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          plan_path = Path('plan.md')
          text = plan_path.read_text(encoding='utf-8')
          old_progress = '''#### PR4：迁入 Vben 必要源码（第九批）

          - 状态：进行中
          - 实际 PR：#21
          - 当前范围：本地化 Bearer Token 格式化并统一请求头与刷新认证使用，不修改请求客户端、拦截器或认证流程
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第九批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#21
          - 已验证实现提交：`3e7187a841175ed3ef6190f893690c18514cd468`
          - CI：run `29984951947` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/api/request.ts`、`src/core/request/format-bearer-token.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 Bearer Token 格式化；未修改请求客户端、拦截器、Token 刷新、重新认证、错误处理、依赖或锁文件
          '''
          if old_progress not in text:
              raise SystemExit('PR21 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR #21 正在本地化 Bearer Token 格式化
          - 当前改动：新增 `src/core/request/format-bearer-token.ts` 与单测；请求头和刷新认证统一使用本地 helper
          - 下一步：完成 PR #21 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前阶段：PR #21 已完成第九批实现与 CI，等待最终 review 与合并
          - 当前改动：新增 `src/core/request/format-bearer-token.ts` 与单测；请求头和刷新认证统一使用本地 helper
          - 下一步：合并 PR #21 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          plan_path.write_text(text.replace(old_handoff, new_handoff, 1), encoding='utf-8')

          runtime_path = Path('runtime-localization.md')
          runtime = runtime_path.read_text(encoding='utf-8')
          old_validation = '''- 新增单元测试，覆盖普通 Token、`null` 和空字符串。
          - 完整 lint、typecheck、unit test 和 root build 结果在本 PR 最终验证时记录。
          '''
          new_validation = '''- 新增单元测试，覆盖普通 Token、`null`、空字符串和原始内容保留。
          - CI run `29984951947` 的 install、lint、根 typecheck、unit test 和根 build 全部通过。
          - `pnpm dev` 与 `pnpm dev:ele` 的浏览器冒烟验证尚未执行。
          '''
          if old_validation not in runtime:
              raise SystemExit('PR21 validation block not found')
          runtime_path.write_text(
              runtime.replace(old_validation, new_validation, 1),
              encoding='utf-8',
          )
          PY

      - name: Format documentation
        run: pnpm exec prettier plan.md runtime-localization.md --write

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr21-final-plan.yml

      - name: Commit documentation update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md runtime-localization.md .github/workflows/update-pr21-final-plan.yml
          git commit -m 'docs: update PR21 validation and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
