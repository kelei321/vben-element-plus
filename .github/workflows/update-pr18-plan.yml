name: Update PR18 plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 18 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第五批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#17
          - 已验证实现提交：`1ec6cfe5dd4f129d7ed8ef119c04a5763b34aebe`
          - CI：run `29976074463` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/router/routes/index.ts`、`src/router/route-modules.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化路由模块合并与名称收集；未修改路由定义、守卫、权限、菜单、动态导入、依赖或锁文件
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第五批）

          - 状态：已完成
          - 实际 PR：#17
          - 最终 head：`1a19c2d91f691165420923d53be6ae21bb0aa55c`
          - 合并提交：`817075e9d037d99b58c1803cbb75ee8cbf72e8ac`
          - CI：run `29976332772` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/router/routes/index.ts`、`src/router/route-modules.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化路由模块合并与名称收集；未修改路由定义、守卫、权限、菜单、动态导入、依赖或锁文件

          #### PR4：迁入 Vben 必要源码（第六批）

          - 状态：进行中
          - 实际 PR：#18
          - 当前范围：本地化请求层实际使用的 API 地址解析，不复制未使用的钉钉认证配置，不修改请求客户端或拦截器
          '''
          if old_progress not in text:
              raise SystemExit('PR17 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前 main：`135baa8b737746f696c325c714081fdad9e86cf0`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口；PR #13 本地化全局 Loading；PR #14 本地化偏好覆盖 helper；PR #15 本地化静态路由重置工具；PR #16 本地化登录路由常量
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；Loading、偏好覆盖 helper、路由重置和登录路径常量已本地化；其他运行时仍依赖 workspace 包
          - 当前阶段：PR #17 已完成第五批实现与 CI，等待最终 review 与合并
          - 当前改动：新增包无关的 `src/router/route-modules.ts` 与单测；`apps/web-ele/src/router/routes/index.ts` 移除两项 `@vben/utils` 运行时导入
          - 下一步：合并 PR #17 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前 main：`817075e9d037d99b58c1803cbb75ee8cbf72e8ac`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口；PR #13 本地化全局 Loading；PR #14 本地化偏好覆盖 helper；PR #15 本地化静态路由重置工具；PR #16 本地化登录路由常量；PR #17 本地化路由模块聚合工具
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；Loading、偏好覆盖 helper、路由基础工具和登录路径常量已本地化；其他运行时仍依赖 workspace 包
          - 当前阶段：PR #18 正在本地化 API 地址解析
          - 当前改动：新增 `src/app/config/resolve-api-url.ts` 与双路径单测；`apps/web-ele/src/api/request.ts` 移除 `useAppConfig` 运行时导入
          - 下一步：完成 PR #18 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr18-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr18-plan.yml
          git commit -m 'docs: update PR18 progress and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
