name: Update PR14 plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 14 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第一批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#13
          - 已验证实现提交：`5d277550984a2860e11dcee0757ab32af3553262`
          - CI：run `29971494647` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/main.ts`、`src/shared/utils/loading.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 `unmountGlobalLoading`；未升级依赖、未修改锁文件、未改写表单或业务逻辑
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第一批）

          - 状态：已完成
          - 实际 PR：#13
          - 最终 head：`30fc71e2dc474690d9d0826e05735832bf770a3f`
          - 合并提交：`9f59d2c584ba0cd42debe5a5ce2550a91409c95b`
          - CI：run `29971750387` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/main.ts`、`src/shared/utils/loading.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 `unmountGlobalLoading`；未升级依赖、未修改锁文件、未改写表单或业务逻辑

          #### PR4：迁入 Vben 必要源码（第二批）

          - 状态：进行中
          - 实际 PR：#14
          - 当前范围：本地化 `defineOverridesPreferences` identity helper，保留应用侧偏好类型约束，不迁移偏好管理器、缓存或持久化逻辑
          '''
          if old_progress not in text:
              raise SystemExit('PR13 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前 main：`96096b2d295acca79f798f4331a419e3e75808af`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口和根 `dev/build/typecheck/test` 命令
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；运行时仍依赖 workspace 包；尚未升级依赖或修改锁文件
          - 当前阶段：PR #13 已完成 PR4 第一批，本地化 `unmountGlobalLoading`，等待最终 review 与合并
          - 当前改动：`apps/web-ele/src/main.ts` 改为导入 `src/shared/utils/loading.ts`；根 `src/main.ts` 继续转发应用入口；新增 DOM 单测
          - 下一步：合并 PR #13 后同步唯一功能分支到最新 main，再梳理下一个最小运行时本地化单元
          '''
          new_handoff = '''- 当前 main：`9f59d2c584ba0cd42debe5a5ce2550a91409c95b`
          - 唯一功能分支：`feat/vben-559-foundation`
          - 已完成：PR #1 导入基线；PR #6 收敛依赖范围；PR #7 建立根 Vite 入口；PR #13 本地化全局 Loading 工具并补 DOM 单测
          - 当前结构：根 `src/main.ts` 仍转发到 `apps/web-ele/src/main`；全局 Loading 已本地化；其他运行时仍依赖 workspace 包
          - 当前阶段：PR #14 正在本地化 `defineOverridesPreferences` identity helper
          - 当前改动：新增 `src/app/preferences/define-overrides.ts` 与单测；`apps/web-ele/src/preferences.ts` 保留 `Preferences/DeepPartial` 类型约束并移除 helper 的运行时 workspace 导入
          - 下一步：完成 PR #14 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr14-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr14-plan.yml
          git commit -m 'docs: update PR14 progress and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
