name: Update PR20 final plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 20 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update validation and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          plan_path = Path('plan.md')
          text = plan_path.read_text(encoding='utf-8')
          old_progress = '''#### PR4：迁入 Vben 必要源码（第八批）

          - 状态：进行中
          - 实际 PR：#20
          - 当前范围：本地化 `v-access` 指令注册与角色/权限码判断，不迁移权限组件、路由权限、动态菜单或访问状态
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第八批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#20
          - 已验证实现提交：`78989d98b0778f16d6aee17039a4e183e3196bf8`
          - CI：run `29983662138` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/bootstrap.ts`、`apps/web-ele/src/access/directive.ts`、`src/access/check-directive-access.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 `v-access` 指令注册和角色/权限码判断；未修改权限 Store、权限组件、路由权限、动态菜单、依赖或锁文件
          '''
          if old_progress not in text:
              raise SystemExit('PR20 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR #20 正在本地化 `v-access` 权限指令
          - 当前改动：新增 `src/access/check-directive-access.ts` 与单测、应用侧 `apps/web-ele/src/access/directive.ts`；`bootstrap.ts` 移除权限指令的运行时 workspace 导入
          - 下一步：完成 PR #20 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前阶段：PR #20 已完成第八批实现与 CI，等待最终 review 与合并
          - 当前改动：新增包无关的 `src/access/check-directive-access.ts` 与单测、应用侧 `apps/web-ele/src/access/directive.ts`；`bootstrap.ts` 移除权限指令的运行时 workspace 导入
          - 下一步：合并 PR #20 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          plan_path.write_text(text.replace(old_handoff, new_handoff, 1), encoding='utf-8')

          runtime_path = Path('runtime-localization.md')
          runtime = runtime_path.read_text(encoding='utf-8')
          old_validation = '''- 新增单元测试，覆盖角色模式、权限码模式、拒绝访问和空指令值。
          - 完整 lint、typecheck、unit test 和 root build 结果在本 PR 最终验证时记录。
          '''
          new_validation = '''- 新增单元测试，覆盖角色模式、权限码模式、拒绝访问和空指令值。
          - CI run `29983662138` 的 install、lint、根 typecheck、unit test 和根 build 全部通过。
          - `pnpm dev` 与 `pnpm dev:ele` 的浏览器冒烟验证尚未执行。
          '''
          if old_validation not in runtime:
              raise SystemExit('PR20 validation block not found')
          runtime_path.write_text(
              runtime.replace(old_validation, new_validation, 1),
              encoding='utf-8',
          )
          PY

      - name: Format documentation
        run: pnpm exec prettier plan.md runtime-localization.md --write

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr20-final-plan.yml

      - name: Commit documentation update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md runtime-localization.md .github/workflows/update-pr20-final-plan.yml
          git commit -m 'docs: update PR20 validation and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
