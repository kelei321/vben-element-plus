name: Import Vben 5.5.9 baseline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  import-baseline:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: feat/vben-559-foundation
          fetch-depth: 0

      - name: Checkout Vben 5.5.9
        uses: actions/checkout@v4
        with:
          repository: vbenjs/vue-vben-admin
          ref: v5.5.9
          path: .upstream
          fetch-depth: 1
          persist-credentials: false

      - name: Import baseline source
        shell: bash
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github/workflows/' \
            .upstream/ ./
          rm -rf .upstream
          rm -f .github/workflows/import-vben-559.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No baseline files to import."
            exit 0
          fi

          git commit -m "chore: import Vben 5.5.9 baseline"
          git push origin HEAD:feat/vben-559-foundation
