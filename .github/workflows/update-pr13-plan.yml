name: Update PR13 plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 13 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码

          - 状态：进行中
          - 实际 PR：#8
          - 当前范围：先梳理并迁移低风险运行时基础能力，保持现有行为，不升级依赖、不重写表单
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第一批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#13
          - 已验证实现提交：`5d277550984a2860e11dcee0757ab32af3553262`
          - CI：run `29971494647` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/main.ts`、`src/shared/utils/loading.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 `unmountGlobalLoading`；未升级依赖、未修改锁文件、未改写表单或业务逻辑
          '''
          if old_progress not in text:
              raise SystemExit('PR4 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR4 迁入 Vben 必要运行时源码，优先从低风险基础能力开始，按实际依赖拆成小步提交
          - 下一步：读取仓库规则和 `apps/web-ele` 直接依赖图，确定首个本地化单元并完成 CI 验证
          - 未完成验证：需要本地运行 `pnpm dev`，检查登录、菜单、标签页、权限和 Element Plus 页面
          '''
          new_handoff = '''- 当前阶段：PR #13 已完成 PR4 第一批，本地化 `unmountGlobalLoading`，等待最终 review 与合并
          - 当前改动：`apps/web-ele/src/main.ts` 改为导入 `src/shared/utils/loading.ts`；根 `src/main.ts` 继续转发应用入口；新增 DOM 单测
          - 下一步：合并 PR #13 后同步唯一功能分支到最新 main，再梳理下一个最小运行时本地化单元
          - 未完成验证：需要本地运行 `pnpm dev` 和 `pnpm dev:ele`，检查登录、菜单、标签页、权限、全局 Loading 和 Element Plus 页面
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr13-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr13-plan.yml
          git commit -m 'docs: update PR13 progress and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
