name: Update PR18 final plan

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-plan:
    if: github.event.pull_request.number == 18 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update plan progress and handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('plan.md')
          text = path.read_text(encoding='utf-8')

          old_progress = '''#### PR4：迁入 Vben 必要源码（第六批）

          - 状态：进行中
          - 实际 PR：#18
          - 当前范围：本地化请求层实际使用的 API 地址解析，不复制未使用的钉钉认证配置，不修改请求客户端或拦截器
          '''
          new_progress = '''#### PR4：迁入 Vben 必要源码（第六批）

          - 状态：已完成，待最终 review 与合并
          - 实际 PR：#18
          - 已验证实现提交：`c2a8d96b5b21681c6ec918ac1507cfe537703d05`
          - CI：run `29977252094` 的 install、lint、根 typecheck、unit test、根 build 全部通过
          - changed files：`apps/web-ele/src/api/request.ts`、`src/app/config/resolve-api-url.ts`、对应单测、迁移记录和本计划
          - 本地验证：`pnpm dev` 与 `pnpm dev:ele` 浏览器冒烟未运行
          - 范围：仅本地化 API 地址解析；未修改请求客户端、拦截器、Token 刷新、重新认证、错误处理、依赖或锁文件
          '''
          if old_progress not in text:
              raise SystemExit('PR18 progress block not found')
          text = text.replace(old_progress, new_progress, 1)

          old_handoff = '''- 当前阶段：PR #18 正在本地化 API 地址解析
          - 当前改动：新增 `src/app/config/resolve-api-url.ts` 与双路径单测；`apps/web-ele/src/api/request.ts` 移除 `useAppConfig` 运行时导入
          - 下一步：完成 PR #18 CI、review 和合并，再选择下一个依赖边界清晰的最小运行时单元
          '''
          new_handoff = '''- 当前阶段：PR #18 已完成第六批实现与 CI，等待最终 review 与合并
          - 当前改动：新增 `src/app/config/resolve-api-url.ts` 与双路径单测；`apps/web-ele/src/api/request.ts` 移除 `useAppConfig` 运行时导入
          - 下一步：合并 PR #18 后同步唯一功能分支到最新 main，再选择下一个依赖边界清晰的最小运行时单元
          '''
          if old_handoff not in text:
              raise SystemExit('handoff block not found')
          text = text.replace(old_handoff, new_handoff, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/update-pr18-final-plan.yml

      - name: Commit plan update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add plan.md .github/workflows/update-pr18-final-plan.yml
          git commit -m 'docs: update PR18 validation and handoff'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
